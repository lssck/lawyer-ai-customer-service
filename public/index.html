<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>李颖翔律师 · 在线法律咨询</title>
<style>
:root {
  --navy: #1a1a2e;
  --navy-light: #16213e;
  --gold: #c9a84c;
  --gold-light: #e8d48b;
  --white: #ffffff;
  --gray-50: #f8fafc;
  --gray-100: #f1f5f9;
  --gray-200: #e2e8f0;
  --gray-300: #cbd5e1;
  --gray-400: #94a3b8;
  --gray-500: #64748b;
  --gray-600: #475569;
  --gray-700: #334155;
  --green-light: #ecfdf5;
  --green-text: #059669;
  --red-light: #fef2f2;
  --red-text: #dc2626;
  --radius: 12px;
  --radius-lg: 16px;
  --shadow: 0 4px 24px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.12);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
}

.app {
  width: 100%;
  max-width: 420px;
  height: 90vh;
  max-height: 780px;
  background: var(--white);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

/* === 顶部栏 === */
.header {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: relative;
}
.header::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--gold), var(--gold-light), var(--gold));
}
.avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--gold);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  color: var(--navy);
  font-weight: 700;
  flex-shrink: 0;
}
.header-info h1 {
  font-size: 16px;
  color: var(--white);
  font-weight: 600;
  letter-spacing: 0.5px;
}
.header-info p {
  font-size: 12px;
  color: var(--gold-light);
  display: flex;
  align-items: center;
  gap: 4px;
}
.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #34d399;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

/* === 消息区域 === */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  scroll-behavior: smooth;
}
.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 2px; }

.message {
  display: flex;
  gap: 8px;
  max-width: 88%;
  animation: msgIn 0.3s ease;
}
@keyframes msgIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.message.bot { align-self: flex-start; }
.message.user { align-self: flex-end; flex-direction: row-reverse; }

.msg-avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 600;
}
.message.bot .msg-avatar { background: var(--navy); color: var(--gold); }
.message.user .msg-avatar { background: var(--gray-200); color: var(--gray-600); }

.bubble {
  padding: 10px 14px;
  border-radius: var(--radius);
  font-size: 14px;
  line-height: 1.6;
  word-break: break-word;
}
.message.bot .bubble {
  background: var(--gray-50);
  color: var(--gray-700);
  border-top-left-radius: 4px;
}
.message.user .bubble {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
  color: var(--white);
  border-top-right-radius: 4px;
}

/* === 快速操作 === */
.quick-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 0 16px 8px;
}
.quick-btn {
  padding: 6px 14px;
  border: 1px solid var(--gold);
  border-radius: 20px;
  background: transparent;
  color: var(--navy);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.quick-btn:hover {
  background: var(--gold);
  color: var(--navy);
  transform: scale(1.02);
}
.quick-btn:active { transform: scale(0.98); }

/* === 免责横幅 === */
.disclaimer-bar {
  padding: 6px 16px;
  background: #fffbeb;
  font-size: 11px;
  color: #92400e;
  text-align: center;
  border-top: 1px solid #fef3c7;
  line-height: 1.4;
}

/* === 输入区域 === */
.input-area {
  padding: 12px 16px 16px;
  background: var(--white);
  border-top: 1px solid var(--gray-100);
}
.input-row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
}
.input-row textarea {
  flex: 1;
  padding: 10px 14px;
  border: 1.5px solid var(--gray-200);
  border-radius: 24px;
  font-size: 14px;
  font-family: inherit;
  resize: none;
  outline: none;
  transition: border-color 0.2s;
  max-height: 100px;
  line-height: 1.4;
  background: var(--gray-50);
}
.input-row textarea:focus { border-color: var(--gold); }
.send-btn {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
  color: var(--gold);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}
.send-btn:hover { transform: scale(1.05); box-shadow: 0 4px 12px rgba(26,26,46,0.3); }
.send-btn:active { transform: scale(0.95); }
.send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.send-btn svg { width: 20px; height: 20px; }

/* === 加载动画 === */
.typing {
  display: flex;
  gap: 4px;
  padding: 4px 0;
}
.typing span {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--gray-400);
  animation: typing 1.2s infinite;
}
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-6px); opacity: 1; }
}

/* === 时间标签 === */
.time-label {
  text-align: center;
  font-size: 11px;
  color: var(--gray-400);
  padding: 4px 0;
}

/* === 响应式 === */
@media (max-width: 480px) {
  body { padding: 0; }
  .app { max-width: 100%; height: 100vh; max-height: 100vh; border-radius: 0; }
}

/* === 配置面板 === */
.config-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 100;
  padding: 16px;
}
.config-overlay.show { display: flex; }
.config-panel {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 24px;
  width: 100%;
  max-width: 360px;
  box-shadow: var(--shadow-lg);
}
.config-panel h2 {
  font-size: 16px;
  color: var(--navy);
  margin-bottom: 16px;
}
.config-panel label {
  display: block;
  font-size: 13px;
  color: var(--gray-600);
  margin-bottom: 4px;
  margin-top: 12px;
}
.config-panel input {
  width: 100%;
  padding: 8px 12px;
  border: 1.5px solid var(--gray-200);
  border-radius: 8px;
  font-size: 14px;
  outline: none;
}
.config-panel input:focus { border-color: var(--gold); }
.config-panel .config-actions {
  margin-top: 16px;
  display: flex;
  gap: 8px;
}
.config-panel button {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: none;
  font-size: 14px;
  cursor: pointer;
  font-weight: 500;
}
.config-panel .btn-save {
  background: var(--navy);
  color: var(--gold);
}
.config-panel .btn-cancel {
  background: var(--gray-100);
  color: var(--gray-600);
}
.config-panel .btn-save:hover { opacity: 0.9; }
</style>
</head>
<body>

<div class="app">
  <!-- 顶部栏 -->
  <div class="header">
    <div class="avatar">law</div>
    <div class="header-info">
      <h1 id="lawyer-name">李颖翔律师 · 在线咨询</h1>
      <p><span class="status-dot"></span> 在线 · 平均响应 &lt; 30秒</p>
    </div>
  </div>

  <!-- 消息区域 -->
  <div class="messages" id="messages"></div>

  <!-- 快速操作 -->
  <div class="quick-actions" id="quick-actions">
    <button class="quick-btn" onclick="sendQuick('我被公司辞退了，没有给补偿金')">被辞退无补偿</button>
    <button class="quick-btn" onclick="sendQuick('对方借钱不还，没有借条')">借钱不还</button>
    <button class="quick-btn" onclick="sendQuick('想离婚但对方不同意')">离婚纠纷</button>
    <button class="quick-btn" onclick="sendQuick('出了交通事故对方全责')">交通事故</button>
    <button class="quick-btn" onclick="sendQuick('公司商标被别人注册了')">商标侵权</button>
    <button class="quick-btn" onclick="sendQuick('律师收费怎么算？')">收费标准</button>
  </div>

  <!-- 免责横幅 -->
  <div class="disclaimer-bar">
    本对话由AI辅助，仅供法律咨询参考，不构成正式法律意见。如需委托请面谈签约。
  </div>

  <!-- 输入区域 -->
  <div class="input-area">
    <div class="input-row">
      <textarea id="input" rows="1" placeholder="描述您的法律问题..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>
</div>

<!-- 配置面板（律师信息自定义）-->
<div class="config-overlay" id="config-overlay">
  <div class="config-panel">
    <h2>自定义律师信息</h2>
    <label>律师姓名</label>
    <input type="text" id="cfg-name" value="李颖翔律师">
    <label>专长领域</label>
    <input type="text" id="cfg-field" value="企业法律风险防控、企业收并购尽职调查、公司年度法律顾问">
    <label>联系方式</label>
    <input type="text" id="cfg-contact" value="邮箱：27182836@qq.com">
    <div class="config-actions">
      <button class="btn-cancel" onclick="closeConfig()">取消</button>
      <button class="btn-save" onclick="saveConfig()">保存</button>
    </div>
  </div>
</div>

<script>
// === 配置 ===
const CONFIG = {
  apiUrl: '/api/chat',
  lawyerName: localStorage.getItem('lawyer_name') || '李颖翔律师',
  lawyerField: localStorage.getItem('lawyer_field') || '企业法律风险防控、企业收并购尽职调查、公司年度法律顾问',
  lawyerContact: localStorage.getItem('lawyer_contact') || '邮箱：27182836@qq.com'
};

// === 状态 ===
let conversationId = null;
let isTyping = false;

// === 初始化 ===
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('lawyer-name').textContent = CONFIG.lawyerName + ' · 在线咨询';
  document.getElementById('cfg-name').value = CONFIG.lawyerName;
  document.getElementById('cfg-field').value = CONFIG.lawyerField;
  document.getElementById('cfg-contact').value = CONFIG.lawyerContact;

  addTimeLabel();
  addBotMessage(
    `您好！我是${CONFIG.lawyerName}的在线法律咨询助手。\n\n` +
    `我擅长领域：${CONFIG.lawyerField}\n\n` +
    `请简要描述您的法律问题，我会为您提供初步分析和建议。如需正式委托，可以安排面谈。`
  );
});

// === 发送消息 ===
async function sendMessage() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text || isTyping) return;

  addUserMessage(text);
  input.value = '';
  input.style.height = 'auto';
  await getBotReply(text);
}

function sendQuick(text) {
  document.getElementById('input').value = text;
  sendMessage();
}

async function getBotReply(userText) {
  isTyping = true;
  showTyping();
  const sendBtn = document.getElementById('send-btn');
  sendBtn.disabled = true;

  try {
    const res = await fetch(CONFIG.apiUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: userText,
        conversation_id: conversationId,
        lawyer_name: CONFIG.lawyerName,
        lawyer_field: CONFIG.lawyerField,
        lawyer_contact: CONFIG.lawyerContact
      })
    });
    const data = await res.json();

    if (data.conversation_id) conversationId = data.conversation_id;

    hideTyping();
    addBotMessage(data.reply);
  } catch (err) {
    hideTyping();
    addBotMessage('网络异常，请稍后重试。如急需咨询，可直接拨打：' + CONFIG.lawyerContact);
  } finally {
    isTyping = false;
    sendBtn.disabled = false;
  }
}

// === 消息渲染 ===
function addUserMessage(text) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'message user';
  div.innerHTML = `
    <div class="msg-avatar">我</div>
    <div class="bubble">${escapeHtml(text)}</div>
  `;
  container.appendChild(div);
  scrollToBottom();
}

function addBotMessage(text) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'message bot';
  // 处理换行和简单格式
  const formatted = text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
  div.innerHTML = `
    <div class="msg-avatar">law</div>
    <div class="bubble">${formatted}</div>
  `;
  container.appendChild(div);
  scrollToBottom();
}

function addTimeLabel() {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'time-label';
  const now = new Date();
  div.textContent = `${now.getMonth()+1}月${now.getDate()}日 ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
  container.appendChild(div);
}

function showTyping() {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'message bot';
  div.id = 'typing-indicator';
  div.innerHTML = `
    <div class="msg-avatar">law</div>
    <div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>
  `;
  container.appendChild(div);
  scrollToBottom();
}

function hideTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function scrollToBottom() {
  const container = document.getElementById('messages');
  container.scrollTop = container.scrollHeight;
}

// === 工具 ===
function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

// === 配置面板 ===
function openConfig() {
  document.getElementById('config-overlay').classList.add('show');
}
function closeConfig() {
  document.getElementById('config-overlay').classList.remove('show');
}
function saveConfig() {
  CONFIG.lawyerName = document.getElementById('cfg-name').value || '李颖翔律师';
  CONFIG.lawyerField = document.getElementById('cfg-field').value || '企业法律风险防控';
  CONFIG.lawyerContact = document.getElementById('cfg-contact').value || '';

  localStorage.setItem('lawyer_name', CONFIG.lawyerName);
  localStorage.setItem('lawyer_field', CONFIG.lawyerField);
  localStorage.setItem('lawyer_contact', CONFIG.lawyerContact);

  document.getElementById('lawyer-name').textContent = CONFIG.lawyerName + ' · 在线咨询';
  closeConfig();
}

// 长按头像打开配置
document.querySelector('.avatar').addEventListener('dblclick', openConfig);
</script>
</body>
</html>
